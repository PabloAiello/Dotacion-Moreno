<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bajas - Sede Moreno</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --card-border: #e2e8f0;
            --text-color: #1e293b;
            --text-muted: #64748b;
            --primary-blue: #1d4ed8;
            --primary-blue-light: #eff6ff;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.07);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 1400px; }
        header { text-align: center; margin-bottom: 35px; }

        .header-logo {
            max-width: 200px;
            height: auto;
            margin-bottom: 15px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin: 0 0 6px 0;
            text-transform: uppercase;
            color: var(--primary-blue);
        }

        header p { color: var(--text-muted); font-size: 1.05rem; margin: 0 0 15px 0; }

        .sheet-links {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .sheet-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background-color: #ffffff;
            color: var(--primary-blue);
            border: 1px solid #bfdbfe;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            text-decoration: none;
            box-shadow: var(--shadow-sm);
            transition: all 0.2s ease;
        }

        .sheet-btn.active {
            background-color: var(--primary-blue);
            color: white;
            border-color: var(--primary-blue);
        }

        .sheet-btn:hover:not(.active) { background-color: var(--primary-blue-light); }

        .controls { display: flex; gap: 15px; margin-bottom: 20px; }

        .search-input {
            width: 100%;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 12px 18px;
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
        }

        .table-responsive {
            overflow-x: auto;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            box-shadow: var(--shadow-sm);
            border-radius: 12px;
        }

        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 14px 18px; border-bottom: 1px solid var(--card-border); }

        th {
            background-color: var(--primary-blue-light);
            color: var(--primary-blue);
            font-size: 0.82rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        tr:hover td { background-color: #f1f5f9; }
        .loading { text-align: center; padding: 40px; color: var(--text-muted); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <img src="logo.jpg" alt="Logo Nini" class="header-logo">
        <h1>Bajas – Sede Moreno</h1>
        <p>Registro histórico y detalle de bajas de personal</p>
        
        <div class="sheet-links">
            <a href="index.html" class="sheet-btn">📌 Dotación / Búsquedas</a>
            <a href="nomina.html" class="sheet-btn">📊 Nómina Julio</a>
            <a href="bajas.html" class="sheet-btn active">🔻 Bajas</a>
        </div>
    </header>

    <div class="controls">
        <input type="text" id="searchInput" class="search-input" placeholder="🔍 Buscar registros en Bajas...">
    </div>

    <div class="table-responsive">
        <div id="loadingStatus" class="loading">Sincronizando pestaña Bajas...</div>
        <table id="mainTable" style="display: none;">
            <thead id="tableHeader"></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script src="bajas.js"></script>
</body>
</html>
