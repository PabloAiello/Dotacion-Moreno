<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dotación Pendiente - Sede Moreno</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">
</head>

<body>

    <header>

        <div class="titulo">

            <h1>
                <i class="fa-solid fa-users"></i>
                DOTACIÓN PENDIENTE
            </h1>

            <h2>SEDE MORENO</h2>

            <p>
                Seguimiento del personal requerido para completar la dotación operativa
            </p>

        </div>

    </header>

    <main>

        <!-- TARJETAS -->

        <section class="cards">

            <div class="card">

                <i class="fa-solid fa-bullseye"></i>

                <h3>Dotación Objetivo</h3>

                <span id="objetivo">0</span>

            </div>

            <div class="card">

                <i class="fa-solid fa-user-check"></i>

                <h3>Cubiertos</h3>

                <span id="cubiertos">0</span>

            </div>

            <div class="card">

                <i class="fa-solid fa-user-xmark"></i>

                <h3>Vacantes</h3>

                <span id="vacantes">0</span>

            </div>

            <div class="card">

                <i class="fa-solid fa-chart-pie"></i>

                <h3>% Cobertura</h3>

                <span id="porcentaje">0%</span>

            </div>

        </section>

        <!-- BUSCADOR -->

        <section class="busqueda">

            <div class="input">

                <i class="fa-solid fa-magnifying-glass"></i>

                <input
                    type="text"
                    id="buscar"
                    placeholder="Buscar puesto o sector...">

            </div>

        </section>

        <!-- TABLA -->

        <section class="contenedor-tabla">

            <table id="tabla">

                <thead>

                    <tr>

                        <th>Sector</th>

                        <th>Puesto</th>

                        <th>Tenemos</th>

                        <th>Presupuestado</th>

                        <th>Falta</th>

                        <th>Prioridad</th>

                    </tr>

                </thead>

                <tbody>

                </tbody>

            </table>

        </section>

    </main>

    <footer>

        <p>

            <i class="fa-solid fa-building"></i>

            Dashboard de Recursos Humanos - Sede Moreno

        </p>

    </footer>

    <script src="app.js"></script>

</body>

</html>
